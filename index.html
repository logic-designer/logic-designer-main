ierState(n));\n  }\n  const k = normalizeKeyName(ev.key || '');\n  return k === n;\n}\n\nconst liveKeysDown = new Set();\nfunction isKeyHeldNow(name){\n  const n = normalizeKeyName(name);\n  return !!(n && liveKeysDown.has(n));\n}\nfunction isDeleteKeyHeldNow(){\n  const del = normalizeKeyName(keymap.deleteKey);\n  if(!del) return false;\n  if(isKeyHeldNow(del)) return true;\n  if(del === 'Delete' && isKeyHeldNow('Backspace')) return true;\n  return false;\n}\nwindow.addEventListener('keydown', (e)=>{\n  const k = normalizeKeyName(e.key || '');\n  if(k) liveKeysDown.add(k);\n}, true);\nwindow.addEventListener('keyup', (e)=>{\n  const k = normalizeKeyName(e.key || '');\n  if(k) liveKeysDown.delete(k);\n}, true);\nwindow.addEventListener('blur', ()=>liveKeysDown.clear());\n\nfunction isEditableTarget(target){\n  if(!target) return false;\n  if(target.isContentEditable) return true;\n  const tag = target.tagName;\n  if(tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT') return true;\n  return !!(target.closest && (target.closest('.note-text') || target.closest('.note-title') || target.closest('.segment-label') || target.closest('.fpga-editor')));\n}\n\nfunction isSnapActive(ev){\n  if(!ev) return false;\n  if(keyMatches(ev, keymap.snapModifier)) return true;\n  if(keymap.snapCapsLock && ev.getModifierState && ev.getModifierState('CapsLock')) return true;\n  return false;\n}\n\nfunction isMultiSelectActive(ev){\n  return keyMatches(ev, keymap.snapModifier);\n}\n\nfunction isFreeWireActive(ev){\n  return keyMatches(ev, keymap.freeWireModifier);\n}\n\nfunction isRouteCancelKey(ev){\n  const k = (ev && ev.key) ? ev.key : '';\n  return k === 'Escape' || k === 'Backspace';\n}\n\nfunction parseHexColor(value){\n  if(typeof value !== 'string') return null;\n  const hex = value.trim();\n  if(/^#[0-9a-fA-F]{3}$/.test(hex)){\n    const r = parseInt(hex[1] + hex[1], 16);\n    const g = parseInt(hex[2] + hex[2], 16);\n    const b = parseInt(hex[3] + hex[3], 16);\n    return pendChild(path);\n  svg.appendChild(hit);\n  svg.appendChild(startDot);\n  svg.appendChild(endDot);\n  svg.appendChild(label);\n  return wireDom.get(w.id);\n}\n\nfunction redrawWires(){\n  if(!svg){ ensureWorld(); if(!svg) return; }\n  const activeIds=new Set();\n\n  for(const w of state.wires){\n    if(w.hidden) continue;\n    const raw = wirePointsForRender(w);\n    if(raw.length<2) continue;\n    const useManhattan = gridAlignedPoints(raw);\n    const pts = useManhattan ? ensureOrthogonal(raw) : raw;\n    const dStr = useManhattan ? manhattanRoundedPath(pts) : smoothBezierPath(pts, 0.35);\n    const entry = ensureWireEntry(w);\n    entry.path.setAttribute('d', dStr);\n    entry.path.setAttribute('class','wire'+(w.isBus?' bus':'')+(w.active?' active':'')+(state.wireSelection===w?' selected':''));\n    entry.hit.setAttribute('d', dStr);\n    entry.hit.setAttribute('class','wire-hit'+(w.isBus?' bus':''));\n\n    // open-end dots\n    if(w.openStart){\n      const st = pts[0];\n      entry.startDot.setAttribute('cx', st.x); entry.startDot.setAttribute('cy', st.y); entry.startDot.setAttribute('r','3.5');\n      entry.startDot.style.display='';\n    } else { entry.startDot.style.display='none'; }\n    if(w.openEnd){\n      const end = pts[pts.length-1];\n      entry.endDot.setAttribute('cx', end.x); entry.endDot.setAttribute('cy', end.y); entry.endDot.setAttribute('r','3.5');\n      entry.endDot.style.display='';\n    } else { entry.endDot.style.display='none'; }\n\n    const name = (w.netName || '').trim();\n    if(name){\n      const pos = wireLabelPoint(pts);\n      if(pos){\n        entry.label.textContent = name;\n        entry.label.setAttribute('x', pos.x);\n        entry.label.setAttribute('y', pos.y);\n        entry.label.style.display='';\n      } else {\n        entry.label.style.display='none';\n      }\n    } else {\n      entry.label.textContent = '';\n      entry.label.style.display='none';\n    }\n\n    entry.path.__wire = w; entry.hit.__wire = w;\n    activeIds.add(w.id);\n  }\n\n  // remove stale wire elements\n  for(const [id, entry] of wireDom){\n    if(activeIds.has(id)) continue;\n    try{\n      entry.path.remove(); entry.hit.remove();\n      entry.startDot.remove(); entry.endDot.remove();\n      entry.label.remove();\n    }catch{}\n    wireDom.delete(id);\n  }\n  if(state.wireSelection && !activeIds.has(state.wireSelection.id)){\n    state.wireSelection = null;\n  }\n\n  // junction dots (shared net anchor points)\n  const junctionCounts = new Map();\n  for(const w of state.wires){\n    if(w.hidden) continue;\n    const netKey = wireNetKey(w);\n    if(!netKey) continue;\n    const pts = [];\n    if(w.tap) pts.push(w.tap);\n    for(const p of w.points || []) pts.push(p);\n    const raw = wirePointsForRender(w);\n    if(w.openStart && raw.length) pts.push(raw[0]);\n    if(w.openEnd && raw.length) pts.push(raw[raw.length-1]);\n    const seen = new Set();\n    for(const p of pts){\n      if(!p) continue;\n      const x = Math.round(p.x * 2) / 2;\n      const y = Math.round(p.y * 2) / 2;\n      const key = `${netKey}@${x},${y}`;\n      if(seen.has(key)) continue;\n      seen.add(key);\n      const entry = junctionCounts.get(key) || {x, y, count:0};\n      entry.count += 1;\n      junctionCounts.set(key, entry);\n    }\n  }\n  for(const [key, info] of junctionCounts){\n    if(info.count < 2) continue;\n    let dot = junctionDom.get(key);\n    if(!dot){\n      dot = document.createElementNS('http://www.w3.org/2000/svg','circle');\n      dot.setAttribute('class','wire-junction');\n      dot.setAttribute('r','3.5');\n      svg.appendChild(dot);\n      junctionDom.set(key, dot);\n    }\n    dot.setAttribute('cx', info.x);\n    dot.setAttribute('cy', info.y);\n  }\n  for(const [key, dot] of junctionDom){\n    if(junctionCounts.has(key) && junctionCounts.get(key).count >= 2) continue;\n    try{ dot.remove(); }catch{}\n    junctionDom.delete(key);\n  }\n\n  // live preview while routing\n  if(state.drawing && state.draw){\n    const d = state.draw;\n    let pts=[];\n    if(d.fromInst){\n      const start = d.tap || getPortXY(d.fromInst,true,d.fromPort);\n      pts = [ start, ...d.anchors, d.cursor ];\n    } else if(d.toInst){\n      const end   = getPortXY(d.toInst,false,d.toPort);\n      pts = [ end, ...d.anchors.slice().reverse(), d.cursor ].reverse();\n    } else {\n      pts = d.anchors.slice();\n      const last = pts[pts.length-1];\n      if(!last || last.x !== d.cursor.x || last.y !== d.cursor.y) pts.push(d.cursor);\n    }\n    const useManhattan = gridAlignedPoints(pts);\n    if(!previewPath){\n      previewPath=document.createElementNS('http://www.w3.org/2000/svg','path');\n      previewPath.style.pointerEvents='none';\n      svg.appendChild(previewPath);\n    }\n    previewPath.setAttribute('class','wire'+(d.wireKind==='bus'?' bus':'')+' active');\n    previewPath.setAttribute('d', useManhattan ? manhattanRoundedPath(ensureOrthogonal(pts)) : smoothBezierPath(pts, 0.35));\n    previewPath.style.display='';\n  } else {\n    if(previewPath){ previewPath.style.display='none'; }\n  }\n}\n\n/* ===== Marquee selection ===== */\nfunction startMarqueeFromPoint(pt){\n  if(state.armDefId) return;\n  if(state.marquee) return;\n  const rect = canvas.getBoundingClientRect();\n  state.marquee = document.createElement('div');\n  state.marquee.className = 'marquee';\n  Object.assign(state.marquee.style, {\n    position:'absolute', zIndex:10, border:'1px dashed #60a5fa', background:'rgba(96,165,250,.15)',\n    left: (pt.x - rect.left)+'px', top:(pt.y - rect.top)+'px', width:'0px', height:'0px', pointerEvents:'none'\n  });\n  canvas.appendChild(state.marquee);\n  state.marqueeStart = { x: pt.x, y: pt.y };\n}\nfunction rectsOverlap(a, b){\n  if(!a || !b) return false;\n  return !(a.x2 < b.x1 || a.x1 > b.x2 || a.y2 < b.y1 || a.y1 > b.y2);\n}\nfunction marqueeHitsSegmentRim(inst, selRect){\n  if(!inst || !selRect) return false;\n  const outer = { x1:inst.x, y1:inst.y, x2:inst.x + inst.w, y2:inst.y + inst.h };\n  if(!rectsOverlap(selRect, outer)) return false;\n  const rimPx = 12;\n  const rimWorld = Math.max(2, rimPx / Math.max(0.01, view.scale || 1));\n  const tx = Math.min(rimWorld, Math.max(1, inst.w / 2));\n  const ty = Math.min(rimWorld, Math.max(1, inst.h / 2));\n  const top    = { x1:outer.x1,      y1:outer.y1,      x2:outer.x2,      y2:outer.y1 + ty };\n  const bottom = { x1:outer.x1,      y1:outer.y2 - ty, x2:outer.x2,      y2:outer.y2 };\n  const left   = { x1:outer.x1,      y1:outer.y1,      x2:outer.x1 + tx, y2:outer.y2 };\n  const right  = { x1:outer.x2 - tx, y1:outer.y1,      x2:outer.x2,      y2:outer.y2 };\n  return rectsOverlap(selRect, top)\n      || rectsOverlap(selRect, bottom)\n      || rectsOverlap(selRect, left)\n      || rectsOverlap(selRect, right);\n}\nfunction marqueeHitsInstance(inst, selRect){\n  if(!inst || !selRect) return false;\n  if(inst.def.kind === 'segment'){\n    return marqueeHitsSegmentRim(inst, selRect);\n  }\n  const box = { x1:inst.x, y1:inst.y, x2:inst.x + inst.w, y2:inst.y + inst.h };\n  return rectsOverlap(selRect, box);\n}\nfunction updateMarquee(curX, curY){\n  if(!state.marquee || !state.marqueeStart) return;\n  const rect = canvas.getBoundingClientRect();\n  const x1=Math.min(state.marqueeStart.x, curX);\n  const y1=Math.min(state.marqueeStart.y, curY);\n  const x2=Math.max(state.marqueeStart.x, curX);\n  const y2=Math.max(state.marqueeStart.y, curY);\n  Object.assign(state.marquee.style, {\n    left:(x1-rect.left)+'px', top:(y1-rect.top)+'px', width:(x2-x1)+'px', height:(y2-y1)+'px'\n  });\n\n  const w1 = clientToWorld(x1, y1), w2 = clientToWorld(x2, y2);\n  const minx=Math.min(w1.x,w2.x), miny=Math.min(w1.y,w2.y), maxx=Math.max(w1.x,w2.x), maxy=Math.max(w1.y,w2.y);\n  const selRect = { x1:minx, y1:miny, x2:maxx, y2:maxy };\n  clearMultiSelection();\n  for(const inst of state.instances){\n    if(inst.def.kind === 'segment-port') continue;\n    const hit = marqueeHitsInstance(inst, selRect);\n    if(hit){ state.selectionSet.add(inst); inst.el.classList.add('selected'); }\n  }\n}\nfunction finishMarquee(){\n  if(state.marquee){ state.marquee.remove(); }\n  state.marquee=null; state.marqueeStart=null;\n}\n\n/* ===== Gate Info (markdown) ===== */\nlet gateInfoModal = null;\nlet gateInfoModalKeyHandler = null;\n\nfunction escapeHtml(text){\n  return String(text ?? '')\n    .replace(/&/g, '&amp;')\n    .replace(/</g, '&lt;')\n    .replace(/>/g, '&gt;')\n    .replace(/\"/g, '&quot;');\n}\n\nfunction renderMarkdownInline(text){\n  let out = escapeHtml(text);\n  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');\n  out = out.replace(/\\*\\*([^*]+)\\*\\*/g, '<strong>$1</strong>');\n  out = out.replace(/\\*([^*]+)\\*/g, '<em>$1</em>');\n  return out;\n}\n\nfunction parseMdTableRow(line){\n  let s = String(line ?? '').trim();\n  if(s.startsWith('|')) s = s.slice(1);\n  if(s.endsWith('|')) s = s.slice(0, -1);\n  return s.split('|').map(part => part.trim());\n}\n\nfunction isMdTableSeparator(line){\n  const cells = parseMdTableRow(line);\n  if(!cells.length) return false;\n  return cells.every(cell => /^:?-{3,}:?$/.test(cell));\n}\n\nfunction renderMarkdownToHtml(md){\n  const lines = String(md || '').replace(/\\r\\n?/g, '\\n').split('\\n');\n  const html = [];\n  let i = 0;\n  let para = [];\n  let inList = false;\n\n  const flushPara = ()=>{\n    if(!para.length) return;\n    html.push(`<p>${renderMarkdownInline(para.join(' '))}</p>`);\n    para = [];\n  };\n  const closeList = ()=>{\n    if(!inList) return;\n    html.push('</ul>');\n    inList = false;\n  };\n\n  while(i < lines.length){\n    const line = lines[i];\n    const trimmed = line.trim();\n\n    if(trimmed.startsWith('```')){\n      flushPara(); closeList();\n      const code = [];\n      i++;\n      while(i < lines.length && !String(lines[i]).trim().startsWith('```')){\n        code.push(lines[i]);\n        i++;\n      }\n      html.push(`<pre><code>${escapeHtml(code.join('\\n'))}</code></pre>`);\n      i++;\n      continue;\n    }\n\n    if(!trimmed){\n      flushPara();\n      closeList();\n      i++;\n      continue;\n    }\n\n    if(trimmed.includes('|') && i + 1 < lines.length && isMdTableSeparator(lines[i + 1])){\n      flushPara(); closeList();\n      const header = parseMdTableRow(lines[i]);\n      i += 2; // skip header + separator\n      const rows = [];\n      while(i < lines.length){\n        const t = String(lines[i] || '').trim();\n        if(!t || !t.includes('|')) break;\n        rows.push(parseMdTableRow(lines[i]));\n        i++;\n      }\n      html.push('<table class=\"md-table\"><thead><tr>'\n        + header.map(cell => `<th>${renderMarkdownInline(cell)}</th>`).join('')\n        + '</tr></thead><tbody>'\n        + rows.map(row => '<tr>' + header.map((_, idx)=>`<td>${renderMarkdownInline(row[idx] ?? '')}</td>`).join('') + '</tr>').join('')\n        + '</tbody></table>');\n      continue;\n    }\n\n    const h = trimmed.match(/^(#{1,6})\\s+(.+)$/);\n    if(h){\n      flushPara(); closeList();\n      const lvl = h[1].length;\n      html.push(`<h${lvl}>${renderMarkdownInline(h[2])}</h${lvl}>`);\n      i++;\n      continue;\n    }\n\n    const li = trimmed.match(/^[-*]\\s+(.+)$/);\n    if(li){\n      flushPara();\n      if(!inList){ html.push('<ul>'); inList = true; }\n      html.push(`<li>${renderMarkdownInline(li[1])}</li>`);\n      i++;\n      continue;\n    }\n\n    closeList();\n    para.push(trimmed);\n    i++;\n  }\n\n  flushPara();\n  closeList();\n  return html.join('');\n}\n\nconst gateInfoMarkdownCache = new Map(); // key -> {ok:boolean, markdown?:string, error?:string}\n\nasync function loadTextViaFetch(url){\n  const res = await fetch(url, { cache:'no-store' });\n  if(!res.ok) throw new Error(`HTTP ${res.status}`);\n  return await res.text();\n}\n\nfunction loadTextViaXHR(url){\n  return new Promise((resolve, reject)=>{\n    try{\n      const xhr = new XMLHttpRequest();\n      xhr.open('GET', url, true);\n      xhr.onreadystatechange = ()=>{\n        if(xhr.readyState !== 4) return;\n        // file:// often reports status 0 on success\n        if((xhr.status >= 200 && xhr.status < 300) || (xhr.status === 0 && xhr.responseText)){\n          resolve(xhr.responseText);\n          return;\n        }\n        reject(new Error(`XHR ${xhr.status || 'failed'}`));\n      };\n      xhr.onerror = ()=>reject(new Error('XHR network error'));\n      xhr.send();\n    }catch(err){\n      reject(err);\n    }\n  });\n}\n\nfunction gateInfoMarkdownUrlFor(inst){\n  if(!inst?.def?.id) return null;\n  // Convention: `modules/<gate-id>.js` -> `modules/<gate-id>.md`\n  return new URL(`modules/${inst.def.id}.md`, window.location.href).toString();\n}\n\nfunction getGateInfoMarkdownFromModule(inst){\n  const mod = getGateModule(inst?.def?.id);\n  if(!mod) return null;\n  if(typeof mod.infoMarkdown === 'function'){\n    try{\n      const md = mod.infoMarkdown(inst, getGateModuleApi());\n      return (typeof md === 'string' && md.trim()) ? md : null;\n    }catch{\n      return null;\n    }\n  }\n  if(typeof mod.infoMarkdown === 'string' && mod.infoMarkdown.trim()){\n    return mod.infoMarkdown;\n  }\n  return null;\n}\n\nfunction getGateInfoTitleFromModule(inst){\n  const mod = getGateModule(inst?.def?.id);\n  if(mod && typeof mod.infoTitle === 'string' && mod.infoTitle.trim()){\n    return mod.infoTitle.trim();\n  }\n  return `${inst?.def?.name || inst?.def?.id || 'Gate'} Info`;\n}\n\nasync function loadGateInfoMarkdown(inst){\n  const url = gateInfoMarkdownUrlFor(inst);\n  if(!url) return { ok:false, error:'No module id' };\n  if(gateInfoMarkdownCache.has(url)) return gateInfoMarkdownCache.get(url);\n  try{\n    let markdown = '';\n    try{\n      markdown = await loadTextViaFetch(url);\n    }catch(fetchErr){\n      // Fallback for some file:// browser combinations.\n      markdown = await loadTextViaXHR(url);\n      if(!markdown && fetchErr) throw fetchErr;\n    }\n    const result = { ok:true, markdown:String(markdown || '') };\n    gateInfoMarkdownCache.set(url, result);\n    return result;\n  }catch(err){\n    const result = { ok:false, error:String(err?.message || err || 'Failed to load info') };\n    gateInfoMarkdownCache.set(url, result);\n    return result;\n  }\n}\n\nasync function openGateInfoForInstance(inst){\n  if(!inst?.def) return;\n  const title = getGateInfoTitleFromModule(inst);\n  const inlineMarkdown = getGateInfoMarkdownFromModule(inst);\n  if(inlineMarkdown){\n    showGateInfoModal(title, inlineMarkdown);\n    return;\n  }\n  showGateInfoModal(title, 'Loading...');\n  const loaded = await loadGateInfoMarkdown(inst);\n  if(!loaded.ok){\n    showGateInfoModal(title, `# Info not found\\n\\nCould not load:\\n\\n\\`${gateInfoMarkdownUrlFor(inst) || ''}\\`\\n\\n- ${loaded.error || 'Unknown error'}`);\n    return;\n  }\n  showGateInfoModal(title, loaded.markdown || '');\n}\n\nfunction hideGateInfoModal(){\n  if(gateInfoModal){\n    try{ gateInfoModal.remove(); }catch{}\n    gateInfoModal = null;\n  }\n  if(gateInfoModalKeyHandler){\n    window.removeEventListener('keydown', gateInfoModalKeyHandler, true);\n    gateInfoModalKeyHandler = null;\n  }\n}\n\nfunction showGateInfoModal(title, markdown){\n  hideGateInfoModal();\n  const modal = document.createElement('div');\n  modal.className = 'md-info-modal';\n  modal.innerHTML = `\n    <div class=\"md-info-panel\">\n      <div class=\"md-info-head\">\n        <div class=\"md-info-title\"></div>\n        <button type=\"button\" class=\"btn\" data-act=\"close\">Close</button>\n      </div>\n      <div class=\"md-info-body\"></div>\n    </div>\n  `;\n  modal.querySelector('.md-info-title').textContent = title || 'Info';\n  modal.querySelector('.md-info-body').innerHTML = renderMarkdownToHtml(markdown || '');\n  modal.addEventListener('click', (e)=>{\n    if(e.target === modal || e.target?.dataset?.act === 'close'){\n      hideGateInfoModal();\n    }\n  });\n  gateInfoModalKeyHandler = (ev)=>{\n    if(ev.key === 'Escape'){\n      ev.preventDefault();\n      hideGateInfoModal();\n    }\n  };\n  window.addEventListener('keydown', gateInfoModalKeyHandler, true);\n  document.body.appendChild(modal);\n  gateInfoModal = modal;\n}\n\n/* ===== Context Menu / Actions ===== */\nlet ctxMenu=null;\nfunction showContextMenu(x,y,inst){\n  hideContextMenu();\n  if(!state.selectionSet.has(inst)){\n    setSingleSelection(inst);\n  }\n  ctxMenu=document.createElement('div'); ctxMenu.className='ctx';\n  ctxMenu.style.left=x+'px'; ctxMenu.style.top=y+'px';\n  const multi = state.selectionSet.size>1;\n  const isNote = inst.def.kind === 'note';\n  const isSegment = inst.def.kind === 'segment';\n  const targets = state.selectionSet.size? [...state.selectionSet] : [inst];\n  const handlers = new Map();\n  const rows = [];\n  const addAction = (id, label, run)=>{\n    if(!id || !label || typeof run !== 'function') return;\n    handlers.set(id, run);\n    rows.push(`<button data-act=\"${id}\">${label}</button>`);\n  };\n\n  const mod = getGateModule(inst.def.id);\n  let modActions = [];\n  if(typeof mod?.contextActions === 'function'){\n    try{\n      modActions = mod.contextActions(inst, getGateModuleApi()) || [];\n    }catch{\n      modActions = [];\n    }\n  } else if(Array.isArray(mod?.contextActions)){\n    modActions = mod.contextActions;\n  }\n  for(let i=0;i<modActions.length;i++){\n    const item = modActions[i];\n    if(!item || typeof item !== 'object') continue;\n    const actId = `mod:${item.id || i}`;\n    const label = item.label || item.title || '';\n    addAction(actId, label, ()=>{\n      if(typeof item.run === 'function'){\n        item.run(inst, getGateModuleApi());\n      }\n    });\n  }\n\n  addAction('gate-info', 'Info', ()=>{\n    openGateInfoForInstance(inst);\n  });\n\n  if(isNote){\n    addAction('note-title', 'Rename title…', ()=>{\n      ensureNoteState(inst);\n      const next = prompt('Note title', inst.state.noteTitle || 'NOTE');\n      if(next == null) return;\n      inst.state.noteTitle         markDirty('segment-color');\n      });\n    });\n    addAction('segment-label', 'Edit label…', ()=>{\n      const label = inst.el.querySelector('.segment-label');\n      if(label){ label.focus(); }\n    });\n  }\n  if(!isNote && !isSegment){\n    addAction('rename', 'Rename', ()=>{\n      if(state.selectionSet.size) return;\n      const n=prompt('Name', inst.name||'');\n      if(n==null) return;\n      inst.name=n;\n      const nameEl = inst.el.querySelector('.name');\n      if(nameEl) nameEl.textContent=n;\n      markDirty('rename');\n    });\n    addAction('rotate', `Rotate${multi?' (group)':''}`, ()=>{\n      for(const t of targets){ rotateInst(t,90); }\n    });\n  }\n  addAction('delete', `Delete${multi?' (group)':''}`, ()=>{\n    for(const t of targets){ deleteInstance(t); }\n    clearMultiSelection();\n  });\n\n  ctxMenu.innerHTML=rows.join('');\n  document.body.appendChild(ctxMenu);\n\n  ctxMenu.addEventListener('click', (e)=>{\n    e.stopPropagation();\n    const act=e.target.dataset.act;\n    if(!act) return;\n    const fn = handlers.get(act);\n    if(fn) fn();\n    hideContextMenu();\n  });\n  setTimeout(()=>{ document.addEventListener('click', onOutsideClick, {once:true}); }, 0);\n  function onOutsideClick(ev){ if(!ctxMenu) return; if(!ctxMenu.contains(ev.target)) hideContextMenu(); }\n}\nfunction hideContextMenu(){ if(ctxMenu){ ctxMenu.remove(); ctxMenu=null; } }\nfunction rotateInst(inst, deg){ inst.rot=(inst.rot+deg)%360; inst.el.style.transform=`rotate(${inst.rot}deg)`; positionPorts(inst); redrawWires(); markDirty('rotate'); }\nfunction deleteInstance(inst){\n  const mod=getGateModule(inst.def.id);\n  if(mod?.onRunStop) mod.onRunStop(inst);\n  const seg = segmentForInstance(inst);\n  if(inst.def.kind === 'segment'){\n    if(inst.state?.segmentCollapsed){ setSegmentCollapsed(inst, false); }\n    const ports = inst._segmentPorts;\n    if(ports){\n      for(const p of [...(ports.inputs||[]), ...(ports.outputs||[])]){\n        if(p) deleteInstanc \n  return oscillating;\n}\n\nfunction tick(){\n  simTickSeq++;\n  for(const inst of state.instances) inst._simTickSeq = simTickSeq;\n  const oscillating = propagate();\n  updateStatus(oscillating ? '⚠ Oscillating circuit – tick capped' : 'Tick complete');\n}\n\nbyId('btn-sim')?.addEventListener('click', tick);\nfunction resetHistoryStack(){\n  history.stack=[]; history.idx=-1;\n}\nfunction buildDemoCircuit(){\n  // Extension hook: external scripts can define window.defaultDemoBuilder to seed a design.\n  if (typeof window.defaultDemoBuilder === 'function'){\n    return window.defaultDemoBuilder();\n  }\n  // Default is an empty canvas so users can start from scratch.\n}\nfunction newDesign(){\n  clearAutosave();\n  autosaveEnabled=false;\n  clearDesign();\n  view.scale=1; view.tx=0; view.ty=0;\n  applyView();\n  for(const key of Object.keys(foldState)){ delete foldState[key]; }\n  for(const cat of getCategoryOrder()){ foldState[cat] = true; }\n  rebuildLibrary();\n  setArmed(null);\n  buildDemoCircuit();\n  resetHistoryStack();\n  autosaveEnabled=true;\n  pushHistory('new');\n  persistAutosave();\n}\nwindow.logicDesigner.newDesign = newDesign;\nbyId('btn-new')?.addEventListener('click', newDesign);\n\n/* Continuous run — event-driven logic, frame-driven scope time */\nlet isRunning=false;\nlet runFrameId=null;\nfunction runFrameHeartbeat(){\n  if(!isRunning){\n    runFrameId = null;\n    return;\n  }\n  Scope.renderAll();\n  runFrameId = requestAnimationFrame(runFrameHeartbeat);\n}\nfunction startRunHeartbeat(){\n  if(runFrameId !== null) cancelAnimationFrame(runFrameId);\n  Scope.syncWallClock();\n  runFrameId = requestAnimationFrame(runFrameHeartbeat);\n}\nfunction stopRunHeartbeat(){\n  if(runFrameId !== null){\n    cancelAnimationFrame(runFrameId);\n    runFrameId = null;\n  }\n  Scope.syncWallClock();\n}\nfunction startRun(){\n  if(isRunning) return;\n  isRunning=true;\n  if(byId('btn-run')) byId('btn-run').textContent='⏸ Pause';\n  startRunHeartbeat();\n  for ._sg;\n    if (rt?.timer) {\n      clearTimeout(rt.timer);\n      rt.timer = null;\n    }\n  }\n\n  // ---- Event-driven scheduling for Run mode ----\n  function scheduleRun(inst) {\n    const rt = inst._sg;\n    if (!rt || !rt.running) return;\n    clearRunTimer(inst);\n    const elapsed = runElapsedMs(inst);\n    const delay = nextTransitionDelay(inst, elapsed);\n    if (delay === null) return;\n    rt.timer = setTimeout(() => {\n      if (!rt.running) return;\n      rt.timer = null;\n      const nextElapsed = runElapsedMs(inst);\n      const changed = syncOutputsForElapsed(inst, nextElapsed);\n      if (changed) window.logicDesigner?.propagate?.();\n      scheduleRun(inst);\n    }, Math.max(1, Math.ceil(delay)));\n  }\n\n  function restartRunScheduler(inst) {\n    const rt = inst._sg;\n    if (!rt || !rt.running) return;\n    clearRunTimer(inst);\n    rt.startedAt = performance.now();\n    rt.baseElapsed = 0;\n    syncOutputsForElapsed(inst, 0);\n    window.logicDesigner?.propagate?.();\n    scheduleRun(inst);\n  }\n\r\n  // ---- Gate registration ----\r\n  register({\r\n    id: 'signal-gen',\r\n    name: 'Signal Generator',\r\n    symbol: 'SIG',\r\n    inputs: [],\r\n    outputs: ['Q0'],\r\n\r\n    compute(inp, inst) {\r\n      const s = ensureState(inst);\r\n      // Run mode: outputs are driven by event-driven timers\r\n      if (inst._sg?.running) {\r\n        return s.channels.map((_, i) => !!inst.outputs[i]);\r\n      }\r\n      // Manual tick mode: advance simulated time\r\n      const tickSeq = inst._simTickSeq || 0;\r\n      if (tickSeq !== inst._sgLastTick) {\r\n        inst._sgLastTick = tickSeq;\r\n        const tickMs = window.logicDesigner?.simTickMs || 100;\r\n        inst._sgElapsed = (inst._sgElapsed || 0) + tickMs;\r\n      }\r\n      const elapsed = inst._sgElapsed || 0;\r\n      return s.channels.map(ch => channelOutput(ch, elapsed));\r\n    },\r\n\r\n    onRunStart(inst) {\n      ensureState(inst);\n      inst._sg = { running: true, timer: null, startedAt: performance.now(), baseElapsed: 0 };\n      inst._sgElapsed = 0;\n      inst._sgLastTick = -1;\n      syncOutputsForElapsed(inst, 0);\n      window.logicDesigner?.propagate?.();\n      scheduleRun(inst);\n    },\n\n    onRunStop(inst) {\n      if (inst._sg) {\n        inst._sgElapsed = runElapsedMs(inst);\n        inst._sg.running = false;\n        clearRunTimer(inst);\n        inst._sg = null;\n      }\n    },\n\r\n    onCreate(inst) {\r\n      ensureState(inst);\r\n      rebuildOutputPorts(inst);\r\n    },\r\n\r\n    // Called by loadSnapshot after inst.state is fully restored.\r\n    // Rebuilds the correct number of output ports from the saved channel list.\r\n    onAfterLoad(inst) {\r\n      rebuildOutputPorts(inst);\r\n    },\r\n\r\n    onRefresh(inst) {\r\n      syncGateLabel(inst);\r\n    },\r\n\r\n    glyph: `<svg class=\"glyph\" viewBox=\"0 0 56 36\" stroke=\"#1f2937\" stroke-width=\"2\" fill=\"none\" stroke-linejoin=\"round\" stroke-linecap=\"round\" preserveAspectRatio=\"none\"><polyline points=\"4,26 4,14 14,14 14,26 24,26 24,14 34,14 34,26 44,26 44,14 52,14\"/></svg>`,\r\n\r\n    contextActions(inst, api) {\r\n      return [{\r\n        id: 'sg-edit',\r\n        label: 'Edit Signal Generator...',\r\n        run() { openEditor(inst, api); }\r\n      }];\r\n    },\r\n\r\n    infoMarkdown: \"# Signal Generator\\n\\nProgrammable multi-channel signal sequencer.\\n\\n## How it works\\n- Each **output channel** has a list of ON/OFF steps (durations in milliseconds).\\n- Steps play in order: ON→OFF→next step→... then repeats.\\n- **Repeat 0** = loop forever. **Repeat N** = play N times then stay LOW.\\n\\n## Usage\\n- Right-click the gate and choose **Edit Signal Generator...**\\n- Add/remove output channels with **+ Add Output** / **× Del**.\\n- Add/remove steps per channel with **+ Add Step** / **×**.\\n- Rename an output by editing its name field (affects port label).\\n- Use the **Import / Export JSON** box at the bottom to share configurations.\\n\"\r\n  });\r\n\r\n  // ---- Editor panel ----\r\n  function openEditor(inst, api) {\r\n    document.getElementById('sg-editor-overlay')?.remove();\r\n    const s = ensureState(inst);\r\n\r\n    const overlay = document.createElement('div');\r\n    overlay.id = 'sg-editor-overlay';\r\n    overlay.className = 'sg-editor-overlay';\r\n    document.body.appendChild(overlay);\r\n    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });\r\n\r\n    function rerenderPanel() { render(); }\r\n\r\n    function render() {\r\n      overlay.innerHTML = '';\r\n\r\n      const panel = document.createElement('div');\r\n      panel.className = 'sg-editor-panel';\r\n\r\n      // Header\r\n      const head = document.createElement('div');\r\n      head.className = 'sg-editor-head';\r\n      const title = document.createElement('span');\r\n      title.className = 'sg-editor-title';\r\n      title.textContent = 'Signal Generator';\r\n      const closeBtn = document.createElement('button');\r\n      closeBtn.className = 'sg-editor-close';\r\n      closeBtn.textContent = '×';\r\n      closeBtn.addEventListener('click', () => overlay.remove());\r\n      head.append(title, closeBtn);\r\n      panel.appendChild(head);\r\n\r\n      // Body\r\n      const body = document.createElement('div');\r\n      body.className = 'sg-editor-body';\r\n\r\n      // Channel cards\r\n      s.channels.forEach((ch, ci) => {\r\n        const card = document.createElement('div');\r\n        card.className = 'sg-ch-card';\r\n\r\n        // Channel header row\r\n        const chHead = document.createElement('div');\r\n        chHead.className = 'sg-ch-head';\r\n\r\n        const nameInput = document.createElement('input');\r\n        nameInput.className = 'sg-ch-name';\r\n        nameInput.type = 'text';\r\n        nameInput.value = ch.name;\r\n        nameInput.placeholder = `Q${ci}`;\r\n        nameInput.title = 'Output port name';\r\n\r\n        const rptLabel = document.createElement('span');\r\n        rptLabel.className = 'sg-repeat-label';\r\n        rptLabel.textContent = 'Repeat:';\r\n\r\n        const rptInput = document.createElement('input');\r\n        rptInput.className = 'sg-repeat-input';\r\n        rptInput.type = 'number';\r\n        rptInput.min = '0';\r\n        rptInput.value = ch.repeat;\r\n        rptInput.title = '0 = loop forever';\r\n\r\n        const delChBtn = document.createElement('button');\r\n        delChBtn.className = 'sg-del-btn';\r\n        delChBtn.textContent = '× Del';\r\n        delChBtn.title = 'Delete this output channel';\r\n\r\n        chHead.append(nameInput, rptLabel, rptInput, delChBtn);\r\n        card.appendChild(chHead);\r\n\r\n        nameInput.addEventListener('change', () => {\r\n          ch.name = nameInput.value.trim() || `Q${ci}`;\r\n          rebuildOutputPorts(inst);\r\n          api.markDirty('sg-name');\r\n        });\r\n        rptInput.addEventListener('change', () => {\n          ch.repeat = Math.max(0, parseInt(rptInput.value) || 0);\n          restartRunScheduler(inst);\n          api.markDirty('sg-repeat');\n        });\n        delChBtn.addEventListener('click', () => {\r\n          if (s.channels.length <= 1) { alert('At least one output channel is required.'); return; }\r\n          s.channels.splice(ci, 1);\n          rebuildOutputPorts(inst);\n          restartRunScheduler(inst);\n          api.markDirty('sg-del-ch');\n          rerenderPanel();\n        });\n\r\n        // Steps\r\n        const stepsDiv = document.createElement('div');\r\n        stepsDiv.className = 'sg-steps';\r\n\r\n        ch.steps.forEach((step, si) => {\r\n          const row = document.createElement('div');\r\n          row.className = 'sg-step-row';\r\n\r\n          const idx = document.createElement('span');\r\n          idx.className = 'sg-step-idx';\r\n          idx.textContent = `${si + 1}.`;\r\n\r\n          const onLbl = document.createElement('span');\r\n          onLbl.className = 'sg-step-label';\r\n          onLbl.textContent = 'ON';\r\n\r\n          const onInput = document.createElement('input');\r\n          onInput.className = 'sg-step-input';\r\n          onInput.type = 'number';\r\n          onInput.min = '0';\r\n          onInput.step = '100';\r\n          onInput.value = step.on;\r\n\r\n          const onUnit = document.createElement('span');\r\n          onUnit.className = 'sg-step-unit';\r\n          onUnit.textContent = 'ms';\r\n\r\n          const offLbl = document.createElement('span');\r\n          offLbl.className = 'sg-step-label';\r\n          offLbl.textContent = 'OFF';\r\n\r\n          const offInput = document.createElement('input');\r\n          offInput.className = 'sg-step-input';\r\n          offInput.type = 'number';\r\n          offInput.min = '0';\r\n          offInput.step = '100';\r\n          offInput.value = step.off;\r\n\r\n          const offUnit = document.createElement('span');\r\n          offUnit.className = 'sg-step-unit';\r\n          offUnit.textContent = 'ms';\r\n\r\n          const delStepBtn = document.createElement('button');\r\n          delStepBtn.className = 'sg-del-btn sg-del-step';\r\n          delStepBtn.textContent = '×';\r\n          delStepBtn.title = 'Delete this step';\r\n\r\n          row.append(idx, onLbl, onInput, onUnit, offLbl, offInput, offUnit, delStepBtn);\r\n          stepsDiv.appendChild(row);\r\n\r\n          onInput.addEventListener('change', () => { step.on = Math.max(0, Number(onInput.value) || 0); restartRunScheduler(inst); api.markDirty('sg-step'); });\n          offInput.addEventListener('change', () => { step.off = Math.max(0, Number(offInput.value) || 0); restartRunScheduler(inst); api.markDirty('sg-step'); });\n          delStepBtn.addEventListener('click', () => {\n            if (ch.steps.length <= 1) { alert('At least one step is required.'); return; }\n            ch.steps.splice(si, 1);\n            restartRunScheduler(inst);\n            api.markDirty('sg-del-step');\n            rerenderPanel();\n          });\n        });\r\n\r\n        const addStepBtn = document.createElement('button');\r\n        addStepBtn.className = 'sg-add-btn';\r\n        addStepBtn.textContent = '+ Add Step';\r\n        addStepBtn.addEventListener('click', () => {\n          ch.steps.push({ on: 1000, off: 1000 });\n          restartRunScheduler(inst);\n          api.markDirty('sg-add-step');\n          rerenderPanel();\n        });\n        stepsDiv.appendChild(addStepBtn);\r\n\r\n        card.appendChild(stepsDiv);\r\n        body.appendChild(card);\r\n      });\r\n\r\n      // Add output channel button\r\n      const addChBtn = document.createElement('button');\r\n      addChBtn.className = 'sg-add-btn sg-add-ch-btn';\r\n      addChBtn.textContent = '+ Add Output';\r\n      addChBtn.addEventListener('click', () => {\r\n        const idx = s.channels.length;\n        s.channels.push({ name: `Q${idx}`, steps: [{ on: 1000, off: 1000 }], repeat: 0 });\n        rebuildOutputPorts(inst);\n        restartRunScheduler(inst);\n        api.markDirty('sg-add-ch');\n        rerenderPanel();\n      });\n      body.appendChild(addChBtn);\r\n\r\n      // Import / Export section\r\n      const importSec = document.createElement('div');\r\n      importSec.className = 'sg-import-section';\r\n\r\n      const importLabel = document.createElement('div');\r\n      importLabel.className = 'sg-import-label';\r\n      importLabel.textContent = 'Import / Export JSON';\r\n      importSec.appendChild(importLabel);\r\n\r\n      const codeArea = document.createElement('textarea');\r\n      codeArea.className = 'sg-import-area';\r\n      codeArea.rows = 5;\r\n      codeArea.placeholder = 'Paste JSON here and click Import…';\r\n      codeArea.value = JSON.stringify(s.channels, null, 2);\r\n      importSec.appendChild(codeArea);\r\n\r\n      const importBtn = document.createElement('button');\r\n      importBtn.className = 'sg-add-btn';\r\n      importBtn.textContent = 'Import';\r\n      importBtn.addEventListener('click', () => {\r\n        try {\r\n          const data = JSON.parse(codeArea.value);\r\n          if (!Array.isArray(data) || !data.length) throw new Error('Expected a non-empty array of channels');\r\n          s.channels = data.map((ch, i) => ({\r\n            name: String(ch.name || `Q${i}`),\r\n            steps: (Array.isArray(ch.steps) && ch.steps.length)\r\n              ? ch.steps.map(st => ({ on: Math.max(0, Number(st.on) || 0), off: Math.max(0, Number(st.off) || 0) }))\r\n              : [{ on: 1000, off: 1000 }],\r\n            repeat: Math.max(0, parseInt(ch.repeat) || 0)\r\n          }));\n          rebuildOutputPorts(inst);\n          restartRunScheduler(inst);\n          api.markDirty('sg-import');\n          rerenderPanel();\n        } catch (e) {\r\n          alert('Import failed: ' + e.message);\r\n        }\r\n      });\r\n      importSec.appendChild(importBtn);\r\n\r\n      body.appendChild(importSec);\r\n      panel.appendChild(body);\r\n      overlay.appendChild(panel);\r\n    }\r\n\r\n    render();\r\n  }\r\n})();\r\n\n\n/* === modules/segment.js === */\n(() => {\n  const register = window.logicDesigner?.registerGateModule || window.registerGateModule;\n  if(!register) return;\n  register({\n    id: 'segment',\n    name: 'Segment',\n    symbol: 'SEG',\n    inputs: [],\n    outputs: [],\n    boxW: 10,\n    extraRows: 8,\n    minRows: 8,\n    kind: 'segment',\n    compute(){ return []; },\n    infoMarkdown: \"# Segment\\n\\nContainer/annotation region that can expose `IN` / `OUT` boundary connectors.\\n\\n## Features\\n- Collapse / expand\\n- Linked segments by matching segment label\\n- Boundary I/O counts (`IN:n`, `OUT:n`)\\n\"\n\n  });\n})();\n\n\n/* === modules/segment-port.js === */\n(() => {\n  const register = window.logicDesigner?.registerGateModule || window.registerGateModule;\n  if(!register) return;\n  register({\n    id: 'segment-port',\n    name: 'Segment Port',\n    symbol: '',\n    inputs: ['I'],\n    outputs: ['O'],\n    boxW: 1,\n    extraRows: 0,\n    minRows: 1,\n    hidden: true,\n    kind: 'segment-port',\n    compute(i){ return [!!i[0]]; },\n    infoMarkdown: \"# Segment Port (internal)\\n\\nInternal helper module used for segment boundary connectors.\\n\\nThis is usually managed automatically by the segment system.\\n\"\n\n  });\n})();\n\n";document.currentScript.after(s);})();</script>
